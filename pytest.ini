# =============================================================================
# pytest 설정
# =============================================================================
# 실행 방법:
#   pytest              # 전체 테스트
#   pytest -v           # 상세 출력
#   pytest -k "level"   # "level"이 포함된 테스트만 실행
# =============================================================================

[pytest]
asyncio_mode = auto
testpaths = tests
